<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Panel | ProjectEvolution</title>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: monospace; padding: 20px; }
    .match { background: #1e293b; margin: 10px; padding: 10px; border-radius: 8px; }
    .screenshots img { max-width: 200px; margin: 5px; border: 1px solid #3b82f6; border-radius: 4px; }
    button { background: #3b82f6; border: none; padding: 5px 10px; margin: 5px; cursor: pointer; border-radius: 4px; font-weight: bold; color: white; transition: 0.2s; }
    button:hover { background: #2563eb; transform: scale(1.02); }
    hr { border-color: #334155; }
    .user-info { margin-top: 20px; background: #1e293b; padding: 15px; border-radius: 8px; }
    .action-buttons { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
    .action-buttons button { background: #475569; }
    .action-buttons button:hover { background: #334155; }
  </style>
</head>
<body>
  <div id="authCheck" style="text-align: center; margin-top: 50px;">Проверка прав доступа...</div>
  <div id="adminContent" style="display: none;">
    <h1>Панель модератора | ProjectEvolution</h1>
    <div id="matches"></div>
    <div class="user-info">
      <h3>Информация о текущем пользователе</h3>
      <p id="adminUserInfo">Загрузка...</p>
      <div class="action-buttons">
        <button id="refreshBtn">Обновить список матчей</button>
      </div>
    </div>
    <div class="user-info">
      <h3>Управление игроками</h3>
      <div>
        <input type="text" id="targetUserId" placeholder="ID игрока">
        <input type="text" id="reason" placeholder="Причина">
        <select id="actionType">
          <option value="mute">Мут (в чате)</option>
          <option value="ban">Бан (доступ в игру)</option>
        </select>
        <input type="number" id="durationHours" placeholder="Длительность (часы)" min="0" step="1">
        <button id="applyActionBtn">Применить</button>
        <button id="cancelMatchBtn">Отменить текущий матч (ID матча)</button>
      </div>
    </div>
  </div>

  <script>
    let currentAdminId = null;

    async function checkAdmin() {
      const userId = localStorage.getItem('userId');
      if (!userId) {
        document.getElementById('authCheck').innerHTML = 'Вы не авторизованы. <a href="/">Вернуться на главную</a>';
        return;
      }
      const res = await fetch(`/api/check-admin?userId=${userId}`);
      const data = await res.json();
      if (data.isAdmin) {
        currentAdminId = userId;
        document.getElementById('authCheck').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadUserInfo(userId);
        loadMatches();
      } else {
        document.getElementById('authCheck').innerHTML = 'У вас нет прав администратора. <a href="/">Вернуться на главную</a>';
      }
    }

    async function loadUserInfo(userId) {
      const res = await fetch(`/api/user/${userId}`);
      const data = await res.json();
      if (data.success) {
        const u = data.userData;
        document.getElementById('adminUserInfo').innerHTML = `
          <strong>Логин:</strong> ${u.username}<br>
          <strong>Ник в игре:</strong> ${u.inGameNick}<br>
          <strong>ID в игре:</strong> ${u.inGameId}<br>
          <strong>ID на сайте:</strong> ${u.id}<br>
          <strong>Роль:</strong> Администратор
        `;
      }
    }

    async function loadMatches() {
      const res = await fetch('/api/pending-matches');
      const matches = await res.json();
      const container = document.getElementById('matches');
      container.innerHTML = '';
      if (matches.length === 0) {
        container.innerHTML = '<p>Нет матчей, ожидающих решения.</p>';
        return;
      }
      for (const m of matches) {
        const div = document.createElement('div');
        div.className = 'match';
        div.innerHTML = `
          <h3>Матч ${m.id} (${m.mode} ${m.ranked ? 'ранговый' : 'обычный'})</h3>
          <p>Карта: ${m.map}</p>
          <p>Участники: ${m.participants.join(', ')}</p>
          <div class="screenshots">
            ${Object.entries(m.screenshots || {}).map(([uid, file]) => `
              <div style="display: inline-block; margin: 10px; text-align: center;">
                <strong>${uid}</strong><br>
                <img src="/uploads/${file}" style="max-width: 200px;"><br>
                <button onclick="setWinner('${m.id}', '${uid}')">Победитель</button>
              </div>
            `).join('')}
          </div>
          <hr>
        `;
        container.appendChild(div);
      }
    }

    async function setWinner(matchId, winnerId) {
      const res = await fetch('/api/resolve-match', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ matchId, winnerId })
      });
      const data = await res.json();
      if (data.success) {
        alert('Результат засчитан');
        loadMatches();
      } else {
        alert('Ошибка');
      }
    }

    async function applyAction() {
      const targetUserId = document.getElementById('targetUserId').value.trim();
      const reason = document.getElementById('reason').value.trim();
      const action = document.getElementById('actionType').value;
      const durationHours = parseInt(document.getElementById('durationHours').value);
      if (!targetUserId) return alert('Введите ID игрока');
      const res = await fetch('/api/admin-action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminId: currentAdminId, targetUserId, action, reason, durationHours })
      });
      const data = await res.json();
      alert(data.message);
      if (data.success) {
        document.getElementById('targetUserId').value = '';
        document.getElementById('reason').value = '';
        document.getElementById('durationHours').value = '';
      }
    }

    async function cancelMatch() {
      const matchId = prompt('Введите ID матча для отмены:');
      if (!matchId) return;
      const res = await fetch('/api/cancel-match', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminId: currentAdminId, matchId })
      });
      const data = await res.json();
      alert(data.message);
      if (data.success) loadMatches();
    }

    document.getElementById('refreshBtn').addEventListener('click', loadMatches);
    document.getElementById('applyActionBtn').addEventListener('click', applyAction);
    document.getElementById('cancelMatchBtn').addEventListener('click', cancelMatch);

    checkAdmin();
    setInterval(loadMatches, 5000);
  </script>
</body>
</html>
